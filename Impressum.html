        /* Toggle Button Styles from index.html */
        .toggle-btn {

            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            background: var(--card-bg);
            border: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
        }

        .toggle-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .toggle-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Zustand im Dark Mode */
        body.dark-mode #theme-toggle {
            box-shadow: 0 0 20px rgba(136, 244, 248, 0.2);
            border-color: #88f4f8;
        }

        body.dark-mode #theme-toggle img {
            transform: rotate(180deg);
            filter: drop-shadow(0 0 5px #88f4f8);
        }

        body.dark-mode #lang-toggle {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.1);
        }

        body.lang-en #lang-toggle img {
            transform: rotate(180deg);
        }

        function saveToStorage() {
            try {
                const data = JSON.parse(localStorage.getItem('financeSimData') || '{}');
                data.darkMode = document.body.classList.contains('dark-mode');
                data.curLang = curLang;
                localStorage.setItem('financeSimData', JSON.stringify(data));
            } catch (e) { console.error("Save failed", e); }
        }

        function loadFromStorage() {
            try {
                const saved = localStorage.getItem('financeSimData');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.darkMode) document.body.classList.add('dark-mode');
                    if (data.curLang) curLang = data.curLang;
                }
            } catch (e) { console.error("Load failed", e); }
            document.body.classList.toggle('lang-en', curLang === 'EN');
        }

        function toggleLanguage() {
            curLang = (curLang === 'DE') ? 'EN' : 'DE';
            document.body.classList.toggle('lang-en', curLang === 'EN');
            applyLang();
            saveToStorage();
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            saveToStorage();
        }

        function applyLang() {
            const l = trans[curLang];
            if (!l) return;
            document.documentElement.lang = curLang.toLowerCase();
            document.title = l.title;

            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) {
                metaDesc.setAttribute("content", (curLang === 'DE')
                    ? "Impressum und Datenschutzerklärung von fincast. Informationen zum Anbieter, Haftungsausschluss und Datenschutz."
                    : "Legal notice and privacy policy of fincast. Information about the provider, disclaimer and data protection.");
            }

            const b = document.getElementById('t-back');
            if (b) b.innerText = l.back;
            const c = document.getElementById('legal-content');
            if (c) c.innerHTML = l.content;
        }

        window.onload = () => {
            loadFromStorage();
            applyLang();
        };
